<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DSD Customer Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 280px; min-width: 220px; background: #1F2D3D; color: #ECF0F1;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 2px 0 8px rgba(0,0,0,.4);
  }
  #sidebar h1 { font-size: 15px; font-weight: 700; padding: 14px 16px 10px;
    border-bottom: 1px solid #2C3E50; letter-spacing: .5px; color: #fff; }
  #sidebar h2 { font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: #95A5A6; padding: 10px 16px 4px; }
  #filter-wrap { flex: 1; overflow-y: auto; padding-bottom: 12px; }

  .filter-section { padding: 0 16px; }
  .check-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 13px; cursor: pointer; user-select: none;
  }
  .check-row input { cursor: pointer; accent-color: #3498DB; width: 14px; height: 14px; }
  .swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .btn-row { display: flex; gap: 6px; padding: 6px 16px; }
  .btn {
    flex: 1; padding: 5px 0; font-size: 11px; font-weight: 600;
    border: none; border-radius: 4px; cursor: pointer; background: #2C3E50;
    color: #BDC3C7; transition: background .15s;
  }
  .btn:hover { background: #3498DB; color: #fff; }

  #stats {
    padding: 8px 16px; font-size: 12px; color: #7F8C8D;
    border-top: 1px solid #2C3E50; margin-top: 4px;
  }

  /* ── Map ── */
  #map { flex: 1; }

  /* ── Popup ── */
  .lf-popup { font-size: 13px; line-height: 1.5; min-width: 210px; }
  .lf-popup b { color: #2C3E50; }
  .lf-popup .badge {
    display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: 11px; font-weight: 600; color: #fff; margin: 2px 2px 0 0;
  }

  /* scrollbar */
  #filter-wrap::-webkit-scrollbar { width: 5px; }
  #filter-wrap::-webkit-scrollbar-track { background: transparent; }
  #filter-wrap::-webkit-scrollbar-thumb { background: #2C3E50; border-radius: 3px; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>🗺 DSD Customer Map</h1>
  <div id="filter-wrap">

    <h2>Vehicle Type</h2>
    <div class="filter-section" id="veh-filters"></div>
    <div class="btn-row">
      <button class="btn" onclick="toggleAll('veh', true)">All</button>
      <button class="btn" onclick="toggleAll('veh', false)">None</button>
    </div>

    <h2>Zone</h2>
    <div class="filter-section" id="zone-filters"></div>
    <div class="btn-row">
      <button class="btn" onclick="toggleAll('zone', true)">All</button>
      <button class="btn" onclick="toggleAll('zone', false)">None</button>
    </div>

  </div>
  <div id="stats">Showing <b id="vis-count">–</b> of <b id="tot-count">–</b> customers</div>
</div>

<div id="map"></div>

s": {"code": "9510001465", "name": "СТАНИЦА БУРГЕР", "street": "УЛИЦА 100 57", "zone": "Kamion_04", "special": "", "eligible": "Kamion,Van", "preferred": "Kamion", "avg_kg": 134.7, "visits": 1, "colour": "#7FB3D3"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [21.1935954428752, 42.0005810714792]}, "properties": {"code": "9510001466", "name": "ЛУКС ПАЛАС", "street": "НАСЕЛЕНО МЕСТО БЕЗ УЛИЧЕН СИСТЕМ 1", "zone": "Kamion_03", "special": "", "eligible": "Kamion,Van", "preferred": "Kamion", "avg_kg": 268.0, "visits": 1, "colour": "#AED6F1"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [21.37680456, 42.05961687]}, "properties": {"code": "9510001482", "name": "БЕСА ПЕТРОЛ", "street": "СПОРТСКИ АЕРОДРОМ СТЕНКОВЕЦ 1а", "zone": "Kamion_07", "special": "", "eligible": "Kamion,Van", "preferred": "Kamion", "avg_kg": 1202.9, "visits": 1, "colour": "#1F618D"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [21.40400482, 42.00169833]}, "properties": {"code": "9510001485", "name": "РУСТИ КИДС", "street": "БУЛЕВАР ПАРТИЗАНСКИ ОДРЕДИ 82", "zone": "Van_02", "special": "", "eligible": "Van", "preferred": "Van", "avg_kg": 303.3, "visits": 1, "colour": "#E67E22"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [21.5136905577082, 42.0274511683645]}, "properties": {"code": "9510001495", "name": "ТВИНС БРАДЕРС 3 СТАЈКОВЦИ", "street": "УЛ.1 СТАЈКОВЦИ 2", "zone": "Furgon_02", "special": "", "eligible": "Furgon,Kamion,Van", "preferred": "Furgon", "avg_kg": 935.8, "visits": 1, "colour": "#27AE60"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [21.4166408, 42.001081]}, "properties": {"code": "9510001503", "name": "СУТЛИЈАШ БАР", "street": "ДАНЕ КРАПЧЕВ 23", "zone": "Van_02", "special": "", "eligible": "Van", "preferred": "Van", "avg_kg": 37.4, "visits": 1, "colour": "#E67E22"}}]};
const POLYGONS      = {"type": "FeatureCollection", "features": [{"type": "Feature", "geometry": {"type": "Polygon", "coordinates": [[[21.43007861785311, 41.998885867010074], [21.428190342779853, 41.99743472470818], [21.427997223738274, 41.9952818702249], [21.428125969785956, 41.99317678647601], [21.431687943219593, 41.99204447781636], [21.43636571556016, 41.993926331832014], [21.43700944569877, 41.994994817398236], [21.43258916541365, 41.996605485618865], [21.43007861785311, 41.998885867010074]]]}, "properties": {"zone": "Plostad", "colour": "#E74C3C"}}, {"type": "Feature", "geometry": {"type": "Polygon", "coordinates": [[[21.431494824310327, 41.99938020467104], [21.439927689126115, 41.99899749200797], [21.439477078025767, 42.00443498522089], [21.435380808411548, 42.00599431287442], [21.4332414344641, 42.00582519403957], [21.431494824310327, 41.99938020467104]]]}, "properties": {"zone": "Carsija", "colour": "#8E44AD"}}]};
const ALL_ZONES     = ["Carsija", "Furgon_01", "Furgon_02", "Furgon_03", "Kamion_01", "Kamion_02", "Kamion_03", "Kamion_04", "Kamion_05", "Kamion_06", "Kamion_07", "Kamion_08", "Plostad", "Van_01", "Van_02", "Van_03"];
const VEH_TYPES     = ["Kamion", "Furgon", "Van"];
const ZONE_COLOURS  = {"Carsija": "#8E44AD", "Furgon_01": "#1D8348", "Furgon_02": "#27AE60", "Furgon_03": "#1E8449", "Kamion_01": "#2980B9", "Kamion_02": "#2E86C1", "Kamion_03": "#AED6F1", "Kamion_04": "#7FB3D3", "Kamion_05": "#1A5276", "Kamion_06": "#5DADE2", "Kamion_07": "#1F618D", "Kamion_08": "#154360", "Plostad": "#E74C3C", "Van_01": "#D35400", "Van_02": "#E67E22", "Van_03": "#CA6F1E"};
const DEFAULT_CLR   = "#7F8C8D";

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([41.998, 21.435], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

// ── Special zone polygons ─────────────────────────────────────────────────────
POLYGONS.features.forEach(f => {
  const clr = f.properties.colour;
  L.geoJSON(f, {
    style: { color: clr, weight: 2, fillColor: clr, fillOpacity: 0.08 }
  }).bindTooltip(f.properties.zone, { sticky: true }).addTo(map);
});

// ── Markers ───────────────────────────────────────────────────────────────────
const allMarkers = [];

function makeIcon(colour) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14">
    <circle cx="7" cy="7" r="6" fill="${colour}" stroke="#fff" stroke-width="1.5"/>
  </svg>`;
  return L.divIcon({
    html: svg, className: '', iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

GEOJSON.features.forEach(f => {
  const p    = f.properties;
  const latlng = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
  const marker = L.marker(latlng, { icon: makeIcon(p.colour) });

  const eligible = p.eligible.split(',').map(v => v.trim());
  const badgeHtml = eligible.map(v => {
    const colours = { Kamion: '#2980B9', Furgon: '#27AE60', Van: '#E67E22' };
    return `<span class="badge" style="background:${colours[v] || '#7F8C8D'}">${v}</span>`;
  }).join('');

  marker.bindPopup(`
    <div class="lf-popup">
      <b>${p.name}</b><br>
      <span style="color:#7F8C8D;font-size:11px">${p.code}</span><br>
      ${p.street ? `<span style="font-size:12px">📍 ${p.street}</span><br>` : ''}
      <br>
      <b>Zone:</b> <span style="color:${p.colour};font-weight:600">${p.zone}</span><br>
      <b>Vehicles:</b> ${badgeHtml}<br>
      <b>Preferred:</b> ${p.preferred}<br>
      <b>Avg weight:</b> ${p.avg_kg.toLocaleString()} kg<br>
      <b>Visits:</b> ${p.visits}
    </div>
  `, { maxWidth: 260 });

  marker._zone     = p.zone;
  marker._eligible = eligible;
  allMarkers.push(marker);
});

// Layer group for markers
const markerGroup = L.layerGroup(allMarkers).addTo(map);

// ── Filters state ─────────────────────────────────────────────────────────────
const activeZones = new Set(ALL_ZONES);
const activeVeh   = new Set(VEH_TYPES);

function applyFilters() {
  let visible = 0;
  allMarkers.forEach(m => {
    const zoneOk = activeZones.has(m._zone);
    const vehOk  = m._eligible.some(v => activeVeh.has(v));
    if (zoneOk && vehOk) {
      if (!map.hasLayer(m)) markerGroup.addLayer(m);
      visible++;
    } else {
      if (map.hasLayer(m)) markerGroup.removeLayer(m);
    }
  });
  document.getElementById('vis-count').textContent = visible;
}

// ── Build zone filter UI ──────────────────────────────────────────────────────
const zoneWrap = document.getElementById('zone-filters');
ALL_ZONES.forEach(zone => {
  const clr  = ZONE_COLOURS[zone] || DEFAULT_CLR;
  const div  = document.createElement('label');
  div.className = 'check-row';
  div.innerHTML = `
    <input type="checkbox" data-group="zone" data-val="${zone}" checked>
    <span class="swatch" style="background:${clr}"></span>
    <span>${zone}</span>`;
  div.querySelector('input').addEventListener('change', e => {
    e.target.checked ? activeZones.add(zone) : activeZones.delete(zone);
    applyFilters();
  });
  zoneWrap.appendChild(div);
});

// ── Build vehicle type filter UI ──────────────────────────────────────────────
const vehClrs  = { Kamion: '#2980B9', Furgon: '#27AE60', Van: '#E67E22' };
const vehWrap  = document.getElementById('veh-filters');
VEH_TYPES.forEach(vt => {
  const div  = document.createElement('label');
  div.className = 'check-row';
  div.innerHTML = `
    <input type="checkbox" data-group="veh" data-val="${vt}" checked>
    <span class="swatch" style="background:${vehClrs[vt]}"></span>
    <span>${vt}</span>`;
  div.querySelector('input').addEventListener('change', e => {
    e.target.checked ? activeVeh.add(vt) : activeVeh.delete(vt);
    applyFilters();
  });
  vehWrap.appendChild(div);
});

// ── Toggle All/None ───────────────────────────────────────────────────────────
function toggleAll(group, state) {
  document.querySelectorAll(`input[data-group="${group}"]`).forEach(cb => {
    cb.checked = state;
    const val  = cb.dataset.val;
    if (group === 'zone') state ? activeZones.add(val) : activeZones.delete(val);
    else                  state ? activeVeh.add(val)   : activeVeh.delete(val);
  });
  applyFilters();
}

// ── Init counts ───────────────────────────────────────────────────────────────
document.getElementById('tot-count').textContent = allMarkers.length;
applyFilters();
</script>
